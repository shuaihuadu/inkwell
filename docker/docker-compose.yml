name: inkwell

services:
  # ============================================================
  # WebApi - 主 API 服务（AGUI、会话管理、知识库、仪表盘等）
  # ============================================================
  webapi:
    build:
      context: ..
      dockerfile: src/app/services/Inkwell.WebApi/Dockerfile
    image: inkwell-webapi:latest
    pull_policy: build
    container_name: inkwell-webapi
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      # Azure OpenAI 配置（通过环境变量注入，不要在此处填写真实密钥）
      - AzureOpenAI__Primary__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - AzureOpenAI__Primary__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - AzureOpenAI__Primary__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AzureOpenAI__Secondary__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - AzureOpenAI__Secondary__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - AzureOpenAI__Secondary__DeploymentName=${AZURE_OPENAI_SECONDARY_DEPLOYMENT:-gpt-4o-mini}
      - AzureOpenAI__Embedding__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - AzureOpenAI__Embedding__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - AzureOpenAI__Embedding__DeploymentName=${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}
      # CORS - 允许 webapp 容器访问
      - Cors__Origins__0=http://localhost:3000
      - Cors__Origins__1=http://localhost:5188
      # SQL Server 连接字符串（启用 sqlserver profile 时使用）
      - ConnectionStrings__InkwellDb=Server=sqlserver,1433;Database=InkwellDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Inkwell@2026!};TrustServerCertificate=true
      # OpenTelemetry - 将遥测数据发送到 Aspire Dashboard
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=inkwell-webapi
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - inkwell-network

  # ============================================================
  # Webapp - React SPA 前端（nginx 托管 + API 反向代理）
  # ============================================================
  webapp:
    build:
      context: ..
      dockerfile: src/app/webapp/Dockerfile
    image: inkwell-webapp:latest
    pull_policy: build
    container_name: inkwell-webapp
    ports:
      - "3000:80"
    depends_on:
      webapi:
        condition: service_started
    restart: unless-stopped
    networks:
      - inkwell-network

  # ============================================================
  # A2A Server - Agent-to-Agent 协议服务
  # ============================================================
  a2a-server:
    build:
      context: ..
      dockerfile: src/app/services/Inkwell.A2AServer/Dockerfile
    image: inkwell-a2a-server:latest
    pull_policy: build
    container_name: inkwell-a2a-server
    ports:
      - "5100:5100"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5100
      - AzureOpenAI__Primary__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - AzureOpenAI__Primary__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - AzureOpenAI__Primary__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
    restart: unless-stopped
    networks:
      - inkwell-network

  # ============================================================
  # DTS Emulator - DurableTask Scheduler 本地模拟器
  # 提供 DurableTask 持久化编排能力（gRPC API + 管理面板）
  # ============================================================
  dts-emulator:
    image: mcr.microsoft.com/dts/dts-emulator:latest
    container_name: inkwell-dts-emulator
    ports:
      - "8080:8080"
      - "8082:8082"
    environment:
      - DTS_USE_DYNAMIC_TASK_HUBS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inkwell-network

  # ============================================================
  # DurableHost - DurableTask 控制台主机
  # 依赖 DTS Emulator，自动获取连接字符串
  # ============================================================
  durable-host:
    build:
      context: ..
      dockerfile: src/app/services/Inkwell.DurableHost/Dockerfile
    image: inkwell-durable-host:latest
    pull_policy: build
    container_name: inkwell-durable-host
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      - DTS_CONNECTION_STRING=Endpoint=http://dts-emulator:8080;TaskHub=default;Authentication=None
    depends_on:
      dts-emulator:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - inkwell-network

  # ============================================================
  # SQL Server 2025 - 关系型数据库
  # 用于 EF Core 持久化（会话、文章、知识库等）
  # ============================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: inkwell-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-Inkwell@2026!}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-Inkwell@2026!}\" -C -Q 'SELECT 1' -b || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inkwell-network

  # ============================================================
  # Aspire Dashboard - 可观测性面板（日志、追踪、指标）
  # ============================================================
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: inkwell-aspire-dashboard
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    restart: unless-stopped
    networks:
      - inkwell-network

networks:
  inkwell-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
