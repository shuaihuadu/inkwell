name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            script: dist:win
            artifacts: |
              src/app/desktop/release/*.exe
              src/app/desktop/release/*.msi
          - platform: macos
            os: macos-latest
            script: dist:mac
            artifacts: |
              src/app/desktop/release/*.dmg
              src/app/desktop/release/*.zip
          - platform: linux
            os: ubuntu-latest
            script: dist:linux
            artifacts: |
              src/app/desktop/release/*.AppImage
              src/app/desktop/release/*.deb
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      INKWELL_BUILD_NUMBER: ${{ github.run_number }}.${{ github.run_attempt }}
      INKWELL_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/app/desktop/package-lock.json

      - name: Validate release version
        if: github.event_name == 'push'
        shell: bash
        working-directory: src/app/desktop
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Package version '$package_version' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: src/app/desktop
        run: npm ci

      - name: Build installers
        working-directory: src/app/desktop
        run: npm run ${{ matrix.script }} -- --config.buildVersion=0.0.${{ github.run_number }}.${{ github.run_attempt }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: inkwell-desktop-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    name: publish-github-release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: release-artifacts/*