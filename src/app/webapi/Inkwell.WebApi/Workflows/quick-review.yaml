name: QuickContentReview
description: 快速内容审批流（4 节点串行：验证 → 审核 → 审批 → 发布）
executors:
  - id: validator
    type: InputValidator
  - id: reviewer
    type: ContentReviewer
  - id: gate
    type: ApprovalGate
  - id: publisher
    type: ArticlePublisher
edges:
  - from: validator
    to: reviewer
  - from: reviewer
    to: gate
  - from: gate
    to: publisher
